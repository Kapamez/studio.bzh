<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextation</title>
</head>
<body style="margin: 0; padding: 20px; font-family: Arial, sans-serif;">
    <header style="background-color: #f8f9fa; padding: 1rem; border-bottom: 1px solid #dee2e6;">
        <h1>Nextation</h1>
    </header>

    <nav style="background-color: #007bff; color: white; padding: 1rem; text-align: center;">
        <a href="#" style="color: white; text-decoration: none;">Accueil</a> |
        <a href="#" style="color: white; text-decoration: none;">Contact</a> |
        <a href="#" style="color: white; text-decoration: none;">À propos</a>
    </nav>

    <main style="max-width: 1200px; margin: 0 auto; padding: 20px;">
        <section style="background-color: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px;">
            <h2>Nextation arrive ...</h2>
            <p>Lancement sur le Play Store d'ici la fin de l'été 2026</p>
        </section>

        <section style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
            <div style="background-color: #fff; border-radius: 8px; padding: 1rem; text-align: center;">
                <h3>Horaires des trains</h3>
                <p>En direct</p>
            </div>
            <div style="background-color: #fff; border-radius: 8px; padding: 1rem; text-align: center;">
                <h3>Voie affichée</h3>
                <p>Pour ne pas perdre de temps</p>
            </div>
            <div style="background-color: #fff; border-radius: 8px; padding: 1rem; text-align: center;">
                <h3>Numéro du train</h3>
                <p>Pour vérifier rapidement</p>
            </div>
        </section>
    </main>

    <footer style="background-color: #343a40; color: white; padding: 1rem; text-align: center; position: fixed; bottom: 0; width: 100%;">
        <p>&copy; 2026 Tous droits réservés</p>
    </footer>
</body>
</html>
