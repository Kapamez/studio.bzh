<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio.bzh</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a2744;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero__video-wrapper {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .hero__video-wrapper iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%);
            min-width: 177.77vh;
            min-height: 56.25vw;
            border: none;
            opacity: 0.6;
        }

        .hero__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.3) 0%,
                rgba(255,255,255,0.1) 50%,
                rgba(255,255,255,0.5) 100%
            );
            z-index: 1;
        }

        .hero__content {
            position: relative;
            z-index: 2;
        }

        .hero__title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 500;
            color: #1a2744;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .hero__title .dot {
            color: #c45c26;
        }

        .hero__tagline {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 300;
            color: #1a2744;
            opacity: 0.7;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }

        .hero__link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #c45c26;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(196, 92, 38, 0.3);
            border-radius: 100px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }

        .hero__link:hover {
            background: #c45c26;
            color: #ffffff;
            border-color: #c45c26;
            transform: translateY(-2px);
        }

        .hero__link svg {
            width: 16px;
            height: 16px;
        }

        .hero__soon {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.7rem;
            color: #1a2744;
            opacity: 0.5;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .hero__soon svg {
            width: 14px;
            height: 14px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero__video-wrapper">
            <iframe 
                src="https://player.vimeo.com/video/1190288514?badge=0&autopause=0&autoplay=1&muted=1&loop=1&background=1&controls=0&title=0&byline=0&portrait=0" 
                allow="autoplay; fullscreen" 
                referrerpolicy="strict-origin-when-cross-origin">
            </iframe>
        </div>
        <div class="hero__overlay"></div>

        <div class="hero__content">
            <h1 class="hero__title">Studio<span class="dot">.</span>bzh</h1>
            <p class="hero__tagline">Made in BZH.</p>
            <a href="https://studio.bzh/nextation" rel="noopener" class="hero__link">
                Nextation — Horaires de trains, simplifiés
            </a>
        </div>

        <div class="hero__soon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
            </svg>
            Bientôt sur le Google Play Store
        </div>
    </div>
</body>
</html>
