<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio.bzh</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a2744;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Aligne le contenu à gauche */
            justify-content: flex-start; /* Aligne vers le haut */
            text-align: left; /* Aligne le texte à gauche */
            padding: 15vh 10% 2rem 10%; /* Positionne le contenu environ aux 3/4 de la hauteur */
            background: url('background_2.jpg') no-repeat center center/cover;
        }

        .hero__content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }

        .hero__title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 500;
            color: #ffffff; /* Uniquement du blanc */
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .hero__title .dot {
            color: #ffffff; /* Uniquement du blanc */
        }

        .hero__tagline {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 300;
            color: #ffffff; /* Uniquement du blanc */
            opacity: 0.8;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }

        .hero__link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff; /* Uniquement du blanc */
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.75rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.5); /* Bordure blanche semi-transparente */
            border-radius: 100px;
            transition: all 0.3s ease;
            background: transparent; /* Bouton transparent */
            min-width: 416px; /* Largeur minimale pour éviter le changement de taille au survol */
            text-align: center;
        }

        /* Gestion du changement de texte au survol */
        .hero__link span::before {
            content: attr(data-text);
        }

        .hero__link:hover {
            background: #ffffff;
            color: #1a2744; /* Le texte passe sur la couleur de fond pour rester lisible */
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        .hero__link:hover span::before {
            content: attr(data-hover);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero__content">
            <h1 class="hero__title">Studio<span class="dot">.</span>bzh</h1>
            <p class="hero__tagline">Made in BZH.</p>
            <a href="https://studio.bzh/nextation" rel="noopener" class="hero__link">
                <span data-text="Nextation — Horaires de trains, simplifiés" data-hover="Découvrir Nextation"></span>
            </a>
        </div>
    </div>
</body>
</html>
