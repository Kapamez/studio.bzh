<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio.bzh</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            overflow-x: hidden; /* évite tout débordement horizontal, quel que soit le contenu */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a2744;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Aligne le contenu à gauche */
            justify-content: flex-start; /* Aligne vers le haut */
            text-align: left; /* Aligne le texte à gauche */
            padding: 15vh 8% 2rem 8%; /* Positionne le contenu environ aux 3/4 de la hauteur */
            background: url('background_2.jpg') no-repeat center center/cover;
        }

        .hero__content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            width: 100%;
        }

        .hero__section-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #ffffff;
            opacity: 0.65;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .hero__title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 500;
            color: #ffffff; /* Uniquement du blanc */
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .hero__title .dot {
            color: #ffffff; /* Uniquement du blanc */
        }

        .hero__tagline {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 300;
            color: #ffffff; /* Uniquement du blanc */
            opacity: 0.8;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }

        .hero__link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #ffffff; /* Uniquement du blanc */
            text-decoration: none;
            font-size: clamp(0.7rem, 2.3vw, 0.85rem);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5); /* Bordure blanche semi-transparente */
            border-radius: 100px;
            transition: all 0.3s ease;
            background: transparent; /* Bouton transparent */
            max-width: 100%; /* ne dépasse jamais la largeur de l'écran */
            width: fit-content;
            text-align: center;
            white-space: normal; /* le texte peut revenir à la ligne si besoin sur petit écran */
        }

        .hero__link:hover {
            background: #ffffff;
            color: #1a2744; /* Le texte passe sur la couleur de fond pour rester lisible */
            border-color: #ffffff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero__content">
            <h1 class="hero__title">Studio<span class="dot">.</span>bzh</h1>
            <p class="hero__tagline">Made in BZH.</p>
            <p class="hero__section-label">Réalisations :</p>
            <a href="https://studio.bzh/nextation" rel="noopener" class="hero__link">
                Nextation — Horaires de trains, simplifiés
            </a>
        </div>
    </div>
</body>
</html>
